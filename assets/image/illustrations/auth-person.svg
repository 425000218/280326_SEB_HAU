<svg width="400" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGradient)"/>
  
  <!-- Person illustration -->
  <g transform="translate(200, 60)">
    <!-- Head -->
    <circle cx="0" cy="0" r="35" fill="#0B5FFF" opacity="0.6"/>
    
    <!-- Eyes -->
    <circle cx="-12" cy="-8" r="4" fill="white"/>
    <circle cx="12" cy="-8" r="4" fill="white"/>
    
    <!-- Smile -->
    <path d="M -15,5 Q 0,15 15,5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Body -->
  <g transform="translate(200, 110)">
    <!-- Shirt -->
    <path d="M -40,0 L -30,-20 L 30,-20 L 40,0 L 40,60 Q 0,80 -40,60 Z" fill="#0B5FFF" opacity="0.5"/>
    
    <!-- Arms -->
    <rect x="-55" y="10" width="15" height="50" rx="7" fill="#0B5FFF" opacity="0.4"/>
    <rect x="40" y="10" width="15" height="50" rx="7" fill="#0B5FFF" opacity="0.4"/>
    
    <!-- Legs -->
    <rect x="-15" y="60" width="12" height="70" rx="6" fill="#0B5FFF" opacity="0.3"/>
    <rect x="3" y="60" width="12" height="70" rx="6" fill="#0B5FFF" opacity="0.3"/>
    
    <!-- Shoes -->
    <rect x="-15" y="130" width="12" height="8" rx="2" fill="#0A2540"/>
    <rect x="3" y="130" width="12" height="8" rx="2" fill="#0A2540"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="150" r="20" fill="#FF1493" opacity="0.1"/>
  <circle cx="350" cy="300" r="30" fill="#0B5FFF" opacity="0.1"/>
</svg>