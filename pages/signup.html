<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng ký tài khoản SEB">
    <title>SEB | Đăng ký</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="c-header">
        <div class="c-header__inner">
            <div class="c-header__logo">
                <img src="/assets/image/logo.png" alt="Logo" style="width: 2.5rem; height: 2.5rem;">
                <div class="c-header__logo-text">
                    <h1>HỆ THỐNG MƯỢN/TRẢ THIẾT BỊ</h1>
                </div>
            </div>
            <div class="c-header__actions">
                <a href="/index.html" class="c-btn c-btn--sm" style="background-color: white; color: var(--color-primary);">← Quay lại</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="c-auth-page">
        <!-- Illustration -->
        <div class="c-auth-page__illustration">
            <img src="/assets/image/illustrations/auth-person.png" alt="Illustration">
        </div>

        <!-- Form Container -->
        <div class="c-auth-page__form-container">
            <form class="c-auth-form c-auth-form--signup">
                <h2 class="c-auth-form__title">ĐĂNG KÝ</h2>

                <!-- Full Name -->
                <div class="c-form-group">
                    <label for="fullname" class="c-form-group__label required">Họ và tên</label>
                    <input type="text" id="fullname" class="c-form-group__input" placeholder="Nhập họ và tên" required>
                </div>

                <!-- Position -->
                <div class="c-form-group">
                    <label for="position" class="c-form-group__label required">Chức danh</label>
                    <select id="position" class="c-form-group__select" required>
                        <option value="">-- Chọn chức danh --</option>
                        <option value="teacher">Giáo viên</option>
                        <option value="student">Học sinh</option>
                        <option value="staff">Nhân viên</option>
                    </select>
                </div>

                <!-- ID Number -->
                <div class="c-form-group">
                    <label for="id-number" class="c-form-group__label required">Mã số CNVC</label>
                    <input type="text" id="id-number" class="c-form-group__input" placeholder="Nhập mã số" required>
                </div>

                <!-- Date of Birth -->
                <div class="c-form-group">
                    <label for="dob" class="c-form-group__label required">Ngày sinh</label>
                    <input type="date" id="dob" class="c-form-group__input" required>
                </div>

                <!-- Email -->
                <div class="c-form-group">
                    <label for="email" class="c-form-group__label required">Email</label>
                    <input type="email" id="email" class="c-form-group__input" placeholder="Nhập email" required>
                </div>

                <!-- Phone -->
                <div class="c-form-group">
                    <label for="phone" class="c-form-group__label">Số điện thoại</label>
                    <input type="tel" id="phone" class="c-form-group__input" placeholder="Nhập số điện thoại">
                </div>

                <!-- Department -->
                <div class="c-form-group">
                    <label for="department" class="c-form-group__label">Bộ môn</label>
                    <select id="department" class="c-form-group__select">
                        <option value="">-- Chọn bộ môn --</option>
                        <option value="math">Toán</option>
                        <option value="it">Tin học</option>
                        <option value="science">KHTN</option>
                    </select>
                </div>

                <!-- Terms Checkbox -->
                <div class="c-checkbox">
                    <input type="checkbox" id="terms" class="c-checkbox__input" required>
                    <label for="terms" class="c-checkbox__label">
                        Tôi đã đọc và đồng ý với các <a href="#">Quy định</a> sử dụng phòng học và mượn, trả thiết bị của nhà trường.
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="c-btn c-btn--primary c-btn--block">ĐĂNG KÝ</button>

                <!-- Divider -->
                <div class="c-auth-form__divider"></div>

                <!-- Login Link -->
                <div class="c-auth-form__footer">
                    Đã có tài khoản? <a href="/pages/login.html">Đăng nhập</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="c-footer">
        <div class="c-footer__container">
            <div class="c-footer__content">
                <p class="c-footer__copyright">Copyright 2025</p>
                <p class="c-footer__description">
                    Website này là tài sản thuộc quyền sở hữu hợp pháp của OFM.
                </p>
            </div>
            <p style="text-align: center; font-size: var(--font-size-xs); color: var(--color-text-secondary); padding-top: var(--space-4);">
                Hotline: 0344655621
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/modal.js"></script>
</body>
</html>
